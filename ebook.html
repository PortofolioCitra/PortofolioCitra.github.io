<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ebook UTBK</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <div class="dashboard">
    <header class="topbar">
      <h2>Ebook UTBK</h2>
      <a href="dashboard.html" class="logout">Kembali</a>
<button id="themeToggle" class="theme-btn">🌙</button>
    </header>

    <section class="ebook-grid" id="ebookGrid">
      <!-- Card di-generate JS -->
    </section>
  </div>

  <!-- MODAL DETAIL -->
  <div class="modal hidden" id="ebookModal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <img id="modalCover" class="modal-cover">
      <h2 id="modalTitle"></h2>
      <p class="modal-subtest" id="modalSubtest"></p>
      <p class="modalMateri" id="modalMateri"></p>
      <a id="modalDownload" class="download-btn" target="_blank">
        Download Ebook
      </a>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/ebook.js"></script>
</body>
</html>
